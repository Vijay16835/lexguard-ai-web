name: lexguard_ai
description: "LexGuard AI - Intelligent Legal Document Analyzer"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Voice & Speech Services
  flutter_tts: ^4.2.2
  speech_to_text: ^7.4.0

  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # File Handling
  file_picker: ^11.0.2
  image_picker: ^1.2.2
  path_provider: ^2.1.4
  open_app_file: ^4.0.4
  open_filex: ^4.7.0
  permission_handler: ^12.0.1
  url_launcher: ^6.2.0

  # Storage
  shared_preferences: ^2.3.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  percent_indicator: ^4.2.3

  # Icons & Fonts
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0

  # Animations
  animated_text_kit: ^4.2.3

  # Authentication
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0

  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^10.3.1
  dio_smart_retry: ^7.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  firebase_core_platform_interface: ^7.0.1

flutter:
  uses-material-design: true
